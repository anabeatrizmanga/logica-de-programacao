<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Enduro</title>
</head>
<body>

<h1>Competição de Enduro</h1>
<h4>Está aplicação irá calcular a velocidade média de um determinado trecho e exibir um relatório total do percurso.</h4>

<p>
  Distância (km):
  <input type="number" id="inDistancia">
</p>

<p>
  Tempo (horas):
  <input type="number" id="inTempo">
</p>

<button id="btRegistrar">Registrar Trecho</button>
<button id="btRelatorio">Relatório do Enduro</button>

<h3>Trecho Registrado:</h3>
<p id="outRegistro"></p>

<h3>Relatório Enduro:</h3>
<p id="outRelatorio"></p>
<script src="./competicãoEnduro.js"></script>

</body>
</html>
