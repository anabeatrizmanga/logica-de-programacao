<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área do cículo e perímetro</title>
</head>
<body>
  <h1>Cículo: área e circunferencia.</h1>

    <script> 
         var raio = Number(prompt("Informe o número do raio"));
         const pi = 3.14
         var circunf = 2 * pi * raio
         var areaTotal = pi * raio * raio
         alert("A circunferencia total é:" + circunf);
         alert("A área total é areaTotal:" + areaTotal);
    </script>
    
</body>
</html>
